<html lang="en">
<head>

  <title>M7MD BEDEIRY — Filmmaker</title>
  <meta name="description" content="M7MD BEDEIRY — Filmmaker. Portfolio & showreel.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23050505'/%3E%3Ctext x='32' y='42' font-family='Arial Black, Arial' font-size='26' font-weight='900' fill='%23FAFAFA' text-anchor='middle'%3EM7%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

  <main>

  <section class="frame" aria-label="Intro">

    <!-- الشريط السينمائي العلوي -->
    <header class="bar bar--top">
      <span class="bar__text">M7MD BEDEIRY</span>
    </header>

    <!-- شاشة العرض -->
    <section class="screen" aria-label="Showreel">
      <video
        class="screen__video"
        src="فيديو/Cover-web.mp4"
        poster="فيديو/poster.jpg"
        autoplay muted loop playsinline
        preload="auto"
        aria-hidden="true"
      ></video>

      <div class="screen__scrim" aria-hidden="true"></div>

      <div class="title">
        <h1 class="title__name">M7MD BEDEIRY</h1>
        <p class="title__role">FILMMAKER</p>
      </div>
    </section>

    <!-- الشريط السينمائي السفلي -->
    <footer class="bar bar--bottom" aria-hidden="true"></footer>

  </section>

  <!-- قسم عملاء اشتغلت معهم: عجلة لوجوهات دائرية -->
  <section class="clients" aria-label="عملاء">
    <div class="clients__head" dir="rtl">
      <p class="clients__eyebrow">CLIENTS</p>
      <h2 class="clients__title">عملاء اشتغلت معهم</h2>
    </div>

    <div class="wheel" id="clientsWheel">
      <div class="wheel__rotor"></div>
    </div>
  </section>

  <!-- قسم الأعمال: كل الريلز بالكاروسيل المتداخل -->
  <section class="works" id="works" aria-label="أعمالي">
    <div class="works__head" dir="rtl">
      <p class="works__eyebrow">REELS</p>
      <h2 class="works__title">أعمالي</h2>
    </div>

    <div class="stage" id="stage">
      <button class="nav-arrow nav-arrow--left" id="prevBtn" aria-label="تحريك لليسار">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="nav-arrow nav-arrow--right" id="nextBtn" aria-label="تحريك لليمين">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </section>

  <!-- قسم الصور: شريط بطاقات طولية يتحرك تلقائيًا، والصورة تنفتح كاملة عند المرور عليها -->
  <section class="photos" id="photos" aria-label="صور">
    <div class="photos__head" dir="rtl">
      <p class="photos__eyebrow">STILLS</p>
      <h2 class="photos__title">لقطات</h2>
    </div>

    <div class="strip" id="photoStrip">
      <div class="strip__track" id="photoTrack"></div>
    </div>
  </section>

  <!-- قسم الإنتاج: شريط أغلفة طولية يتحرك تلقائيًا، يكبر عند المرور، والضغط يفتح صفحة المشروع -->
  <section class="prod" id="prod" aria-label="إنتاجات">
    <div class="prod__head" dir="rtl">
      <p class="prod__eyebrow">PRODUCTION</p>
      <h2 class="prod__title">إنتاجات</h2>
    </div>

    <div class="pstrip" id="prodStrip">
      <div class="pstrip__track" id="prodTrack"></div>
    </div>
  </section>

  <!-- الصفحة الأخيرة: تصميم العميل الجاهز -->
  <section class="finalpage" aria-label="عن المصور">
    <img class="finalpage__img" src="الصفحة الاخيره.jpeg" alt="Mohammed Bedeiry — Visual Storyteller · Commercials, Documentaries, Films · Jeddah, Saudi Arabia" loading="lazy" decoding="async">
  </section>

  </main>

  <!-- أيقونة واتساب عائمة (الصفحة الرئيسية فقط) -->
  <a class="wa-float" href="https://wa.me/966543146916" target="_blank" rel="noopener" aria-label="مراسلة محمد بديري على واتساب">
    <svg viewBox="0 0 448 512" fill="currentColor" aria-hidden="true"><path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zm-157 341.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 359.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/></svg>
  </a>

  <!-- مشغل الفيديو (يفتح بالصوت عند الضغط على أي فيديو) -->
  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox__close" aria-label="إغلاق">&times;</button>
    <video class="lightbox__video" controls playsinline></video>
  </div>

  <script src="assets/main.js"></script>
  <script src="assets/reels.js"></script>
  <script src="assets/photos.js"></script>
  <script src="assets/prod.js"></script>
</body>
</html>
